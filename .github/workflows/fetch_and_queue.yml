name: Fetch and Queue Posts

on:
  schedule:
    # Run every 3 hours as a baseline, but we will add randomness inside the job
    - cron: '17 */3 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Random delay and chance
        run: |
          # 30% chance skip temporarily disabled for testing
          # if [ $((RANDOM % 100)) -lt 30 ]; then
          #   echo "Randomly skipping this run to mimic human behavior."
          #   exit 0
          # fi
          # Random sleep between 30 and 120 seconds for fast testing
          SLEEP_TIME=$((RANDOM % 90 + 30))
          echo "Sleeping for $SLEEP_TIME seconds to randomize execution time..."
          sleep $SLEEP_TIME
      - run: pip install -r requirements.txt
      - run: python src/linkedin_fetcher.py && python src/relevance_filter.py && python src/comment_generator.py && python src/gmail_sender.py
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_TOKEN_ISSUE_DATE: ${{ secrets.LINKEDIN_TOKEN_ISSUE_DATE }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER_ADDRESS: ${{ secrets.GMAIL_SENDER_ADDRESS }}
          GMAIL_SENDER_APP_PASSWORD: ${{ secrets.GMAIL_SENDER_APP_PASSWORD }}
          GMAIL_RECEIVER_ADDRESS: ${{ secrets.GMAIL_RECEIVER_ADDRESS }}
      - name: Commit updated seen_posts and pending_approvals
        run: |
          git config user.email "bot@github.com"
          git config user.name "CommentBot"
          git add data/
          git diff --staged --quiet || git commit -m "Update post state [skip ci]"
          git push
